  <body>
    <div class="blog-container">

        </a>
        <span class="breadcrumb-sep">/</span>
        <a href="/projects" class="breadcrumb-link">projects</a>

      <div class="repo-cards" id="repoCards">
        <div class="post-card-loading">loading...</div>

    </template>

    <template id="orgIcon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" fill="currentColor" aria-hidden="true"><path d="M1.75 16A1.75 1.75 0 0 1 0 14.25V1.75C0 .784.784 0 1.75 0h8.5C11.216 0 12 .784 12 1.75v12.5c0 .085-.006.168-.018.25h2.268a.25.25 0 0 0 .25-.25V8.285a.25.25 0 0 0-.111-.208l-1.055-.703a.749.749 0 1 1 .832-1.248l1.055.703c.487.325.779.871.779 1.456v5.965A1.75 1.75 0 0 1 14.25 16h-3.5a.766.766 0 0 1-.197-.026c-.099.017-.2.026-.303.026h-3a.75.75 0 0 1-.75-.75V14h-1v1.25a.75.75 0 0 1-.75.75Zm-.25-1.75c0 .138.112.25.25.25H4v-1.25a.75.75 0 0 1 .75-.75h2.5a.75.75 0 0 1 .75.75v1.25h2.25a.25.25 0 0 0 .25-.25V1.75a.25.25 0 0 0-.25-.25h-8.5a.25.25 0 0 0-.25.25ZM3 3.75A.75.75 0 0 1 3.75 3h.5a.75.75 0 0 1 0 1.5h-.5A.75.75 0 0 1 3 3.75Zm0 3A.75.75 0 0 1 3.75 6h.5a.75.75 0 0 1 0 1.5h-.5A.75.75 0 0 1 3 6.75Zm.75 2.25h.5a.75.75 0 0 1 0 1.5h-.5a.75.75 0 0 1 0-1.5ZM7 3.75A.75.75 0 0 1 7.75 3h.5a.75.75 0 0 1 0 1.5h-.5A.75.75 0 0 1 7 3.75ZM7.75 6h.5a.75.75 0 0 1 0 1.5h-.5a.75.75 0 0 1 0-1.5ZM7 9.75A.75.75 0 0 1 7.75 9h.5a.75.75 0 0 1 0 1.5h-.5A.75.75 0 0 1 7 9.75Z"/></svg>
    </template>

    <template id="starIcon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="14" height="14" fill="currentColor" aria-hidden="true"><path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"/></svg>
    </template>

    <template id="forkIcon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="14" height="14" fill="currentColor" aria-hidden="true"><path d="M5 5.372v.878c0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75v-.878a2.25 2.25 0 1 1 1.5 0v.878a2.25 2.25 0 0 1-2.25 2.25h-1.5v2.128a2.251 2.251 0 1 1-1.5 0V8.5h-1.5A2.25 2.25 0 0 1 3.5 6.25v-.878a2.25 2.25 0 1 1 1.5 0ZM5 3.25a.75.75 0 1 0-1.5 0 .75.75 0 0 0 1.5 0Zm6.75.75a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm-3 8.75a.75.75 0 1 0-1.5 0 .75.75 0 0 0 1.5 0Z"/></svg>
    </template>

    <script>
      const LANGUAGE_COLORS = {
        typescript: '#3178c6',
        javascript: '#f1e05a',
        rust: '#dea584',
        go: '#00add8',
        elixir: '#6e4a7e',
        swift: '#f05138',
        html: '#e34c26',
        css: '#563d7c',
        python: '#3572a5',
      };

      function svgFromTemplate(id) {
        const t = document.getElementById(id);
        return t.content.firstElementChild.cloneNode(true);
      }

      (async function () {
        const container = document.getElementById('repoCards');
        try {
          const res = await fetch('./projects.json');
          if (!res.ok) throw new Error('failed to load');
          const items = await res.json();
          container.innerHTML = '';

          for (const it of items) {
            const card = document.createElement('a');
            card.className = 'repo-card';
            card.href = it.href;
            card.target = '_blank';
            card.rel = 'noreferrer';

            const head = document.createElement('div');
            head.className = 'repo-head';

            const icon = document.createElement('span');
            icon.className = 'repo-icon';
            icon.appendChild(svgFromTemplate(it.kind === 'org' ? 'orgIcon' : 'repoIcon'));
            head.appendChild(icon);

            const name = document.createElement('span');
            name.className = 'repo-name';
            if (it.kind === 'repo') {
              const owner = document.createElement('span');
              owner.className = 'repo-owner';
              owner.textContent = it.owner + ' / ';
              name.appendChild(owner);
              const repo = document.createElement('span');
              repo.className = 'repo-slug';
              repo.textContent = it.repo;
              name.appendChild(repo);
            } else {
              name.textContent = it.name;
            }
            head.appendChild(name);

            const label = document.createElement('span');
            label.className = 'repo-label';
            label.textContent = it.kind === 'org' ? 'organization' : 'public';
            head.appendChild(label);

            card.appendChild(head);

            if (it.description) {
              const desc = document.createElement('p');
              desc.className = 'repo-desc';
              desc.textContent = it.description;
              card.appendChild(desc);
            }

            const meta = document.createElement('div');
            meta.className = 'repo-meta';

            if (it.language) {
              const lang = document.createElement('span');
              lang.className = 'repo-lang';
              const dot = document.createElement('span');
              dot.className = 'repo-lang-dot';
              dot.style.background = LANGUAGE_COLORS[it.language.toLowerCase()] || '#888';
              lang.appendChild(dot);
              const langName = document.createElement('span');
              langName.textContent = it.language;
              lang.appendChild(langName);
              meta.appendChild(lang);
            }

            if (meta.children.length > 0) card.appendChild(meta);

            container.appendChild(card);
          }
        } catch {
          container.innerHTML = '<div class="post-card-empty">could not load.</div>';
        }
      })();
    </script>
  </body>
</html>
